<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Twitter Optimizer{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <style>
        :root {
            --pico-font-size: 16px;
        }
        nav {
            background: #1a1a2e;
            padding: 0.75rem 1.5rem;
            margin-bottom: 2rem;
        }
        nav ul {
            margin: 0;
            padding: 0;
        }
        nav a {
            color: #e0e0e0 !important;
            text-decoration: none;
            font-weight: 500;
        }
        nav a:hover { color: #fff !important; }
        nav .brand { font-weight: 700; font-size: 1.1rem; color: #1da1f2 !important; }
        .card {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 1.25rem;
            margin-bottom: 1rem;
        }
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: #f0f4ff;
            border-radius: 8px;
            padding: 1.25rem;
            text-align: center;
        }
        .stat-card .number {
            font-size: 2rem;
            font-weight: 700;
            color: #1a1a2e;
        }
        .stat-card .label {
            color: #666;
            font-size: 0.85rem;
            margin-top: 0.25rem;
        }
        .badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-impressions { background: #dbeafe; color: #1e40af; }
        .badge-follows { background: #dcfce7; color: #166534; }
        .badge-engagement { background: #fef3c7; color: #92400e; }
        .tweet-card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 1rem;
        }
        .tweet-card .tweet-text {
            font-size: 1.05rem;
            line-height: 1.5;
            margin-bottom: 0.75rem;
        }
        .tweet-card .meta {
            color: #666;
            font-size: 0.85rem;
        }
        .multiplier { color: #16a34a; font-weight: 700; }
        .loading {
            display: none;
            text-align: center;
            padding: 2rem;
        }
        .loading.active { display: block; }
        .tab-group { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .tab-group button {
            padding: 0.5rem 1rem;
            border-radius: 6px;
            border: 1px solid #d1d5db;
            background: #fff;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .tab-group button.active {
            background: #1a1a2e;
            color: #fff;
            border-color: #1a1a2e;
        }
        table { font-size: 0.9rem; }
        .flash-msg {
            background: #dcfce7;
            border: 1px solid #86efac;
            padding: 0.75rem 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
        }
        .flash-msg.error {
            background: #fef2f2;
            border-color: #fca5a5;
        }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="/" class="brand">Twitter Optimizer</a></li>
        </ul>
        <ul>
            <li><a href="/">Dashboard</a></li>
            <li><a href="/upload">Upload</a></li>
            <li><a href="/analysis">Analysis</a></li>
            <li><a href="/experiments">Experiments</a></li>
            <li><a href="/suggestions">Suggestions</a></li>
        </ul>
    </nav>

    <main class="container">
        {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
            <div class="flash-msg">{{ msg }}</div>
            {% endfor %}
        {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

    <script>
        async function apiPost(url, data = {}) {
            const res = await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            return await res.json();
        }

        function showLoading(id) {
            document.getElementById(id).classList.add('active');
        }
        function hideLoading(id) {
            document.getElementById(id).classList.remove('active');
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
